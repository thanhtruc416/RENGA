<div class="reset-password">

  <div class="reset-password__content">

    <!-- Title -->
    <h1 class="reset-password__title">Mật khẩu mới</h1>

    <!-- Form -->
    <div class="reset-password__form">

      <div class="reset-password__field">
        <input
          class="reset-password__input"
          type="password"
          placeholder="MẬT KHẨU MỚI"
          [value]="newPassword()"
          (input)="setNewPassword($any($event.target).value)"
          autocomplete="new-password"
        />
      </div>

      <div class="reset-password__field">
        <input
          class="reset-password__input"
          type="password"
          placeholder="XÁC NHẬN MẬT KHẨU"
          [value]="confirmPassword()"
          (input)="setConfirmPassword($any($event.target).value)"
          autocomplete="new-password"
        />
      </div>

      <button
        class="reset-password__btn"
        type="button"
        (click)="updatePassword()"
        [disabled]="isSubmitting()"
      >
        CẬP NHẬT MẬT KHẨU
      </button>

    </div>

  </div>

</div>
