<div class="forgot-password">

  <div class="forgot-password__content">

    <!-- Title -->
    <h1 class="forgot-password__title">Quên mật khẩu?</h1>
    <p class="forgot-password__subtitle">
      Nhập số điện thoại của bạn để nhận mã khôi phục
    </p>

    <!-- Section 1: Phone + Send -->
    <div class="forgot-password__section">
      <div class="forgot-password__field">
        <input
          class="forgot-password__input"
          type="tel"
          placeholder="SỐ ĐIỆN THOẠI"
          [value]="phone()"
          (input)="setPhone($any($event.target).value)"
          [disabled]="codeSent()"
          autocomplete="tel"
        />
      </div>
      @if (!codeSent()) {
        <button class="forgot-password__btn" type="button" (click)="sendCode()">
          GỬI MÃ
        </button>
      }
    </div>

    <!-- Resend link (after code sent) -->
    @if (codeSent()) {
      <div class="forgot-password__resend">
        @if (countdown() > 0) {
          <span class="forgot-password__resend-countdown">Gửi lại mã ({{ countdown() }}s)</span>
        } @else {
          <button class="forgot-password__resend-btn" type="button" (click)="resendCode()">
            Gửi lại mã
          </button>
        }
      </div>

      <!-- Section 2: OTP -->
      <div class="forgot-password__section">
        <div class="forgot-password__field">
          <span class="forgot-password__otp-label">NHẬP MÃ OTP</span>
          <div class="forgot-password__otp-row">
            @for (i of otpIndices; track i) {
              <input
                #otpInput
                class="forgot-password__otp-box"
                type="text"
                maxlength="1"
                inputmode="numeric"
                autocomplete="one-time-code"
                (input)="onOtpInput(i, $event)"
                (keydown)="onOtpKeydown(i, $event)"
                (paste)="onOtpPaste($event)"
              />
            }
          </div>
        </div>

        <div class="forgot-password__actions">
          <button
            class="forgot-password__btn"
            type="button"
            (click)="confirmOtp()"
            [disabled]="isSubmitting()"
          >
            XÁC NHẬN
          </button>
          <a routerLink="/dang-nhap" class="forgot-password__back-link">
            <img src="/icons/ic-arrow-left.png" alt="" class="forgot-password__back-icon" />
            QUAY LẠI ĐĂNG NHẬP
          </a>
        </div>
      </div>
    }

  </div>

</div>
