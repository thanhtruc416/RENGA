<div class="al-page">
  <div class="al-card">

    <div class="al-header">
      <a routerLink="/" class="al-brand">RENGA</a>
      <p class="al-subtitle">Cổng quản trị nội bộ</p>
    </div>

    <form class="al-form" #f (submit)="$event.preventDefault(); onSubmit(f)">
      <div class="al-field">
        <label class="al-label" for="al-username">TÊN ĐĂNG NHẬP</label>
        <input id="al-username" class="al-input" name="username" type="text"
          placeholder="admin" autocomplete="username" />
      </div>

      <div class="al-field">
        <label class="al-label" for="al-password">MẬT KHẨU</label>
        <input id="al-password" class="al-input" name="password" type="password"
          placeholder="••••••••" autocomplete="current-password" />
      </div>

      @if (error()) {
        <p class="al-error">{{ error() }}</p>
      }

      <button class="al-submit" type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'ĐANG XỬ LÝ...' : 'ĐĂNG NHẬP' }}
      </button>
    </form>

    <a routerLink="/" class="al-back">← Quay lại trang chủ</a>

  </div>
</div>
