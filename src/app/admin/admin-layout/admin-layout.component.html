<div class="admin-layout">
  <aside class="admin-layout__sidebar">
    <!-- Logo -->
    <div class="admin-sidebar__logo">
      <img src="assets/images/logo-icon.png" alt="" aria-hidden="true" class="admin-sidebar__logo-icon" />
      <img src="assets/images/logo-wordmark.png" alt="RENGA" class="admin-sidebar__logo-wordmark" />
      <span class="admin-sidebar__tagline">LUXURY ADMIN SUITE</span>
    </div>

    <!-- Navigation -->
    <nav class="admin-sidebar__nav" aria-label="Admin navigation">
      <a class="admin-sidebar__nav-item"
         routerLink="/admin/dashboard"
         routerLinkActive="admin-sidebar__nav-item--active"
         [routerLinkActiveOptions]="{ exact: true }">
        <svg class="admin-sidebar__nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>DASHBOARD</span>
      </a>

      <a class="admin-sidebar__nav-item"
         routerLink="/admin/san-pham"
         routerLinkActive="admin-sidebar__nav-item--active">
        <svg class="admin-sidebar__nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        <span>QUẢN LÝ SẢN PHẨM</span>
      </a>

      <a class="admin-sidebar__nav-item"
         routerLink="/admin/don-hang"
         routerLinkActive="admin-sidebar__nav-item--active">
        <svg class="admin-sidebar__nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/>
        </svg>
        <span>QUẢN LÝ ĐƠN HÀNG</span>
      </a>

      <a class="admin-sidebar__nav-item"
         routerLink="/admin/don-thiet-ke/tao"
         routerLinkActive="admin-sidebar__nav-item--active">
        <svg class="admin-sidebar__nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        <span>TẠO ĐƠN THIẾT KẾ</span>
      </a>

      <a class="admin-sidebar__nav-item"
         routerLink="/admin/lich-hen"
         routerLinkActive="admin-sidebar__nav-item--active">
        <svg class="admin-sidebar__nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>QUẢN LÝ LỊCH HẸN</span>
      </a>

      <a class="admin-sidebar__nav-item"
         routerLink="/admin/bao-hanh"
         routerLinkActive="admin-sidebar__nav-item--active">
        <svg class="admin-sidebar__nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
        <span>QUẢN LÝ BẢO HÀNH</span>
      </a>

      <a class="admin-sidebar__nav-item"
         routerLink="/admin/hoi-dap"
         routerLinkActive="admin-sidebar__nav-item--active">
        <svg class="admin-sidebar__nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          <line x1="9" y1="10" x2="9" y2="10" stroke-width="2.5"/><line x1="12" y1="10" x2="12" y2="10" stroke-width="2.5"/><line x1="15" y1="10" x2="15" y2="10" stroke-width="2.5"/>
        </svg>
        <span>QUẢN LÝ Q&A</span>
      </a>

      <a class="admin-sidebar__nav-item"
         routerLink="/admin/voucher"
         routerLinkActive="admin-sidebar__nav-item--active">
        <svg class="admin-sidebar__nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
          <line x1="7" y1="7" x2="7.01" y2="7" stroke-width="2.5"/>
        </svg>
        <span>QUẢN LÝ VOUCHER</span>
      </a>

      <a class="admin-sidebar__nav-item admin-sidebar__nav-item--settings admin-sidebar__nav-item--disabled"
         aria-disabled="true">
        <svg class="admin-sidebar__nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>CÀI ĐẶT</span>
      </a>
    </nav>

    <!-- User info -->
    <div class="admin-sidebar__user">
      <div class="admin-sidebar__user-avatar">{{ (currentUser()?.fullName ?? 'A')[0].toUpperCase() }}</div>
      <div class="admin-sidebar__user-info">
        <span class="admin-sidebar__user-name">{{ currentUser()?.fullName ?? 'Admin' }}</span>
        <span class="admin-sidebar__user-role">{{ currentUser()?.role ?? 'admin' }}</span>
      </div>
      <button class="admin-sidebar__logout-btn" type="button" aria-label="Đăng xuất" (click)="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <main class="admin-layout__main">
    <router-outlet />
  </main>
</div>
