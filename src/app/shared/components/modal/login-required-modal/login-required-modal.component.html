<div class="lrm-backdrop" (click)="closed.emit()">
  <div class="lrm-card" (click)="$event.stopPropagation()">

    <div class="lrm-icon-wrap">
      <svg viewBox="0 0 48 48" fill="none" class="lrm-icon">
        <rect x="10" y="22" width="28" height="20" rx="3" stroke="var(--color-primary)" stroke-width="2.5"/>
        <path d="M16 22v-6a8 8 0 0 1 16 0v6" stroke="var(--color-primary)" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="34" cy="34" r="7" fill="var(--color-primary-light)" stroke="var(--color-primary)" stroke-width="0"/>
        <circle cx="34" cy="32" r="3" fill="var(--color-primary)"/>
        <path d="M29 39c0-2.76 2.24-5 5-5s5 2.24 5 5" fill="var(--color-primary)"/>
      </svg>
    </div>

    <h2 class="lrm-title">Yêu Cầu Đăng Nhập</h2>

    <p class="lrm-subtitle">Để thực hiện chức năng này, bạn vui lòng đăng nhập.</p>

    <p class="lrm-promo">
      TRỞ THÀNH THÀNH VIÊN CỦA RENGA<br />
      ĐỂ TẬN HƯỞNG NHỮNG DỊCH VỤ CHẾ TÁC<br />
      BESPOKE VÀ CÁC ĐẶC QUYỀN CAO CẤP NHẤT.
    </p>

    <div class="lrm-actions">
      <a class="lrm-btn lrm-btn--primary" routerLink="/dang-nhap" (click)="closed.emit()">
        ĐĂNG NHẬP NGAY
      </a>
      <button class="lrm-btn lrm-btn--secondary" type="button" (click)="closed.emit()">
        TRỞ VỀ
      </button>
    </div>

  </div>
</div>
