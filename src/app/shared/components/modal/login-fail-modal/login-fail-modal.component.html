<div class="auth-modal__backdrop" (click)="closed.emit()">
  <div class="auth-modal__card" (click)="$event.stopPropagation()">
    <svg class="auth-modal__icon" viewBox="0 0 64 64" fill="none">
      <path d="M32 6L58 54H6L32 6Z" stroke="var(--color-primary)" stroke-width="3.5" stroke-linejoin="round"/>
      <line x1="32" y1="26" x2="32" y2="40" stroke="var(--color-primary)" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="32" cy="48" r="2.5" fill="var(--color-primary)"/>
    </svg>

    <h2 class="auth-modal__title">Đăng nhập không thành công</h2>
    <p class="auth-modal__subtitle">
      Vui lòng đăng nhập lại. Bạn còn {{ remainingAttempts }} lần thử
    </p>

    <button class="auth-modal__btn" type="button" (click)="closed.emit()">
      Thử lại
    </button>
  </div>
</div>
