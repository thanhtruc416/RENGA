<header class="site-header">
  <div class="site-header__inner">

    <div class="site-header__top">
      <a routerLink="/" class="site-header__logo-left">
        <img class="site-header__logo-icon" src="assets/images/logo-icon.png" alt="RENGA" width="64" height="64">
      </a>

      <a routerLink="/" class="site-header__logo-center">
        <img class="site-header__logo-wordmark" src="assets/images/logo-wordmark.png" alt="RENGA" height="56">
      </a>

      <div class="site-header__actions">
        <a routerLink="/gio-hang" class="site-header__action-btn" aria-label="Giỏ hàng">
          <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </a>
        <a routerLink="/lich-su-don-hang" class="site-header__action-btn" aria-label="Đơn hàng">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </a>
        <div class="user-menu" [class.is-open]="userMenuOpen()">
          <button
            class="site-header__action-btn user-menu__trigger"
            aria-label="Tài khoản"
            [attr.aria-expanded]="userMenuOpen()"
            (click)="toggleUserMenu($event)"
          >
            <img class="site-header__avatar" src="https://www.figma.com/api/mcp/asset/d8f4f264-9918-412f-9f0c-96884c5bfe5a" alt="Tài khoản">
          </button>
          <div class="user-menu__dropdown">
            <a routerLink="/auth/dang-nhap" class="user-menu__item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
              Đăng nhập
            </a>
            <a routerLink="/auth/dang-nhap" [queryParams]="{register: 1}" class="user-menu__item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
              Đăng ký
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="site-header__bottom">
      <nav class="site-header__nav" aria-label="Menu chính">
        <div class="site-header__nav-item">
          <a routerLink="/" [routerLinkActive]="'is-active'" [routerLinkActiveOptions]="{exact: true}" class="site-header__nav-link">Trang chủ</a>
        </div>
        <div class="site-header__nav-item" [class.is-open]="openNav() === 'danh-muc'" (click)="toggleNav($event, 'danh-muc')">
          <a routerLink="/danh-muc/nhan" [routerLinkActive]="'is-active'" class="site-header__nav-link">Danh mục Sản phẩm</a>
          <div class="mega-menu" (click)="$event.stopPropagation()">
            <div class="mega-menu__col">
              <p class="mega-menu__col-title">Danh mục sản phẩm</p>
              <a routerLink="/danh-muc/nhan" class="mega-menu__link">Nhẫn</a>
              <a routerLink="/danh-muc/day-chuyen" class="mega-menu__link">Dây chuyền</a>
              <a routerLink="/danh-muc/hoa-tai" class="mega-menu__link">Hoa tai</a>
              <a routerLink="/danh-muc/lac-tay" class="mega-menu__link">Lắc tay &amp; Vòng tay</a>
              <a routerLink="/danh-muc/charm" class="mega-menu__link">Charm</a>
            </div>
          </div>
        </div>
        <div class="site-header__nav-item" [class.is-open]="openNav() === 'bo-suu-tap'" (click)="toggleNav($event, 'bo-suu-tap')">
          <a href="#" class="site-header__nav-link">Bộ sưu tập</a>
          <div class="mega-menu" (click)="$event.stopPropagation()">
            <div class="mega-menu__col">
              <p class="mega-menu__col-title">Bộ sưu tập</p>
              <a href="#" class="mega-menu__link">Bộ trang sức đồng bộ</a>
              <a href="#" class="mega-menu__link">Bộ trang sức cặp đôi</a>
              <a href="#" class="mega-menu__link">Bộ sưu tập Hoàng Gia</a>
            </div>
          </div>
        </div>
        <div class="site-header__nav-item">
          <a routerLink="/studio" [routerLinkActive]="'is-active'" class="site-header__nav-link">The Studio</a>
        </div>
        <div class="site-header__nav-item" [class.is-open]="openNav() === 'designer'" (click)="toggleNav($event, 'designer')">
          <a routerLink="/the-designer" [routerLinkActive]="'is-active'" class="site-header__nav-link">The Designer</a>
          <div class="mega-menu" (click)="$event.stopPropagation()">
            <div class="mega-menu__col">
              <p class="mega-menu__col-title">The Designer</p>
              <a routerLink="/the-designer" class="mega-menu__link">Đặt lịch tư vấn</a>
              <a routerLink="/appointment-history" class="mega-menu__link">Lịch tư vấn của tôi</a>
            </div>
          </div>
        </div>
      </nav>
      <div class="site-header__search">
        <svg class="site-header__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="site-header__search-input" type="text" placeholder="Tìm kiếm...">
      </div>
    </div>

  </div>
</header>
