<div class="gt-stack">
  @for (toast of toasts(); track toast.id) {
    <div class="gt-toast" [class.gt-toast--error]="toast.type === 'error'" [class.gt-toast--success]="toast.type === 'success'">
      @if (toast.type === 'error') {
        <svg class="gt-toast__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      } @else {
        <svg class="gt-toast__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      }
      <span class="gt-toast__msg">{{ toast.message }}</span>
      <button class="gt-toast__close" type="button" (click)="dismiss(toast.id)" aria-label="Đóng">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  }
</div>
