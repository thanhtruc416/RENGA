@if (isNavigating()) { <div class="route-loading-bar"></div> }

@if (!isAdminRoute() && !isAuthRoute()) { <app-header /> }
<router-outlet />
@if (!isAdminRoute() && !isAuthRoute()) {
  <app-footer />
  <app-chatbot />
}

@if (modalService.showLoginRequired()) {
  <app-login-required-modal (closed)="modalService.closeLoginRequired()" />
}

<app-global-toast />
